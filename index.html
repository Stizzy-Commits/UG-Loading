<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OldSchool RP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:      #ffffff;
      --off-white:  #d4d4d4;
      --muted:      #555555;
      --dim:        #333333;
      --border:     rgba(255,255,255,0.1);
      --bg:         #07080b;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 100vh;
    }

    /* ── Background — layered glow + subtle vignette ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(
          ellipse 46% 34% at 50% 38%,
          rgba(34, 96, 255, 0.13) 0%,
          rgba(20, 55, 130, 0.075) 30%,
          rgba(8, 18, 42, 0.045) 52%,
          transparent 76%
        ),
        radial-gradient(
          ellipse 74% 58% at 50% 48%,
          rgba(255,255,255,0.018) 0%,
          transparent 68%
        ),
        radial-gradient(
          ellipse 100% 100% at 50% 100%,
          rgba(0,0,0,0.58) 0%,
          transparent 62%
        ),
        linear-gradient(180deg, #050607 0%, var(--bg) 48%, #050607 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Center block ── */
    .center {
      position: relative; z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      padding: 0 20px;
    }

    /* ── Server logo ── */
    .logo-frame {
      width: clamp(300px, 54vmin, 720px);
      aspect-ratio: 1.466;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
      animation: up 1s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
      filter:
        drop-shadow(0 0 38px rgba(44,119,255,0.10))
        drop-shadow(0 0 120px rgba(18,74,165,0.07))
        drop-shadow(0 18px 30px rgba(0,0,0,0.58));
      transform: translateZ(0);
    }

    .server-logo {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .tagline {
      font-size: clamp(9px, 1.1vmin, 12px);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: clamp(14px, 2vmin, 24px);
      opacity: 0;
      animation: up 0.9s ease 0.35s forwards;
    }

    .rule {
      width: clamp(260px, 36vmin, 500px);
      height: 1px;
      background: var(--border);
      margin: clamp(24px, 4vmin, 52px) 0 clamp(20px, 3.5vmin, 44px);
      opacity: 0;
      animation: up 0.9s ease 0.5s forwards;
    }

    /* ── Progress block ── */
    .status-block {
      width: clamp(260px, 36vmin, 480px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 1.2vmin, 14px);
      opacity: 0;
      animation: up 0.9s ease 0.6s forwards;
    }

    .status-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-text {
      font-size: clamp(11px, 1.3vmin, 13px);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
    .file-count {
      font-size: clamp(11px, 1.3vmin, 13px);
      color: var(--dim);
    }

    .bar-track {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.9));
      border-radius: 1px;
      transition: width 0.35s ease;
    }

    .meta-row {
      display: flex;
      gap: clamp(12px, 2.5vmin, 28px);
      margin-top: clamp(4px, 0.8vmin, 10px);
      justify-content: center;
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .meta-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.5;
      flex-shrink: 0;
    }
    .meta-value {
      font-size: clamp(10px, 1.1vmin, 12px);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="center">
    <div class="logo-frame" aria-label="OldSchool RP">
      <img class="server-logo" src="imgs/logo.png" alt="OldSchool RP">
    </div>
    <p class="tagline">everyone's welcome</p>
    <div class="rule"></div>
    <div class="status-block">
      <div class="status-row">
        <span class="status-text" id="status">Connecting...</span>
        <span class="file-count"  id="file-count"></span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar"></div>
      </div>
      <div class="meta-row">
        <div class="meta-item"><div class="meta-dot"></div><span class="meta-value" id="map-name">—</span></div>
        <div class="meta-item"><div class="meta-dot"></div><span class="meta-value" id="max-players">—</span></div>
        <div class="meta-item"><div class="meta-dot"></div><span class="meta-value" id="gamemode">DarkRP</span></div>
      </div>
    </div>
  </div>


  <script>
    /* ── GMod hooks — bound to window so CEF can call them ── */
    var totalFiles  = 0;
    var neededFiles = 0;

    function setBar(pct) {
      document.getElementById('bar').style.width = Math.min(100, Math.max(0, pct)) + '%';
    }

    window.GameDetails = function(serverName, serverURL, mapName, maxPlayers, steamID, gamemode, volume, language) {
      document.getElementById('map-name').textContent    = mapName    || '—';
      document.getElementById('max-players').textContent = maxPlayers ? maxPlayers + ' slots' : '—';

      if (gamemode) {
        document.getElementById('gamemode').textContent = gamemode;
      }
    };

    window.SetStatusChanged = function(status) {
      document.getElementById('status').textContent = status || 'Loading...';
    };

    window.DownloadingFile = function(fileName) {
      var parts = fileName.split('/');

      document.getElementById('status').textContent = 'Downloading ' + parts[parts.length - 1];

      if (totalFiles > 0) {
        setBar(((totalFiles - neededFiles) / totalFiles) * 100);
      }
    };

    window.SetFilesTotal = function(total) {
      totalFiles = total;
    };

    window.SetFilesNeeded = function(needed) {
      neededFiles = needed;

      if (totalFiles > 0) {
        var done = totalFiles - needed;

        setBar((done / totalFiles) * 100);

        document.getElementById('file-count').textContent = needed > 0 ? done + ' / ' + totalFiles : '';

        if (needed === 0) {
          setBar(100);
        }
      }
    };

    var fakePct = 0;

    var fakeTimer = setInterval(function() {
      fakePct += Math.random() * 2.5;

      if (fakePct >= 75) {
        clearInterval(fakeTimer);
        return;
      }

      if (totalFiles === 0) {
        setBar(fakePct);
      }
    }, 350);
  </script>

</body>
</html>
